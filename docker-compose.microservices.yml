services:
  postgres:
    image: postgres:16-alpine
    container_name: prokura-postgres-ms
    environment:
      POSTGRES_USER: prokura
      POSTGRES_PASSWORD: prokura
      POSTGRES_DB: prokuradb
    ports:
      - "5440:5432"
    volumes:
      - prokura_postgres_ms_data:/var/lib/postgresql/data
      - ./prokura-api/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prokura -d prokuradb"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./prokura-api
    container_name: prokura-api-gateway
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: prokura
      PGPASSWORD: prokura
      PGDATABASE: prokuradb
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    build:
      context: ./prokura-api
    container_name: prokura-catalog-service
    command: ["npm", "run", "service:catalog"]
    environment:
      SERVICE_NAME: catalog
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: prokura
      PGPASSWORD: prokura
      PGDATABASE: prokuradb
      PORT: 5101
    ports:
      - "5101:5101"
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./prokura-api
    container_name: prokura-inventory-service
    command: ["npm", "run", "service:inventory"]
    environment:
      SERVICE_NAME: inventory
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: prokura
      PGPASSWORD: prokura
      PGDATABASE: prokuradb
      PORT: 5102
    ports:
      - "5102:5102"
    depends_on:
      postgres:
        condition: service_healthy

  customer-service:
    build:
      context: ./prokura-api
    container_name: prokura-customer-service
    command: ["npm", "run", "service:customer"]
    environment:
      SERVICE_NAME: customer
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: prokura
      PGPASSWORD: prokura
      PGDATABASE: prokuradb
      PORT: 5103
    ports:
      - "5103:5103"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: ./prokura-api
    container_name: prokura-order-service
    command: ["npm", "run", "service:order"]
    environment:
      SERVICE_NAME: order
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: prokura
      PGPASSWORD: prokura
      PGDATABASE: prokuradb
      PORT: 5104
    ports:
      - "5104:5104"
    depends_on:
      postgres:
        condition: service_healthy

  reporting-service:
    build:
      context: ./prokura-api
    container_name: prokura-reporting-service
    command: ["npm", "run", "service:reporting"]
    environment:
      SERVICE_NAME: reporting
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: prokura
      PGPASSWORD: prokura
      PGDATABASE: prokuradb
      PORT: 5105
    ports:
      - "5105:5105"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  prokura_postgres_ms_data:
